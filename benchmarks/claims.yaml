 "ledger": [
  {"id": "DG-SCHEMA",
   "check": "py-grep",
   "scopes": ["scripts", "hooks", "skills"],
   "pattern": "doc-gardner-schema[.]json",
   "expect_min_files": 1,
   "description": "a doc promises a doc-gardner schema gate some code executes, but no shipped .py references doc-gardner-schema.json"},
  {"id": "KAIZEN-USERREPO",
   "check": "py-co-grep",
   "scopes": ["scripts", "hooks", "skills"],
   "patterns": ["kaizen[.]json", "--root|--target|--repo"],
   "expect_min_files": 1,
   "description": "the kaizen how-to promises config validation for user repos, but no hook/skill invokes config validation with a consumer-repo root (validate_plugin.py hard-anchors ROOT to the karta repo)",
   "retired": "promise corrected, not implemented (2026-07-21): docs/how-to/kaizen.md now states the truth — validate_plugin.py gates only karta's own committed config (ROOT is hard-anchored to the karta repo by design), and a consumer repo validates its own .karta/kaizen.json with the shipped stdlib one-liner in that how-to"},
  {"id": "HOOKS-MATCHER-PARITY",
   "check": "hooks-parity",
   "doc": "docs/how-to/hooks.md",
   "hooks_json": "hooks/hooks.json",
   "rows": [
    {"rule_regex": "Committed binders are read-only", "guard": "guard_binder_immutability.py"},
    {"rule_regex": "Pack edits must validate", "guard": "guard_pack_write.py"},
    {"rule_regex": "Safety-auditor dispatch is complete", "guard": "guard_auditor_dispatch.py"},
    {"rule_regex": "kaizen writer stays inside its surface", "guard": "guard_writer_confinement.py"},
    {"rule_regex": "binders at session start", "guard": "inject_karta_status.py"},
    {"rule_regex": "delivery may not end dirty", "guard": "guard_delivery_stop.py"}
   ],
   "description": "each docs/how-to/hooks.md plugin-hook row's claimed tool surface must match the actual hooks/hooks.json matcher set"}
 ]
}
